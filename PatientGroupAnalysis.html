<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Group Analysis</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: skyblue;
      font-family: Arial, sans-serif;
    }

    /* --- Sticky selector bar: stays reachable while scrolling the 6 pairs --- */
    .selector-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 18px;
      padding: 10px 14px;
      background-color: #cdeafc;              /* slightly deeper than the page */
      border-bottom: 2px solid green;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    .selector-bar .lhs-highlight-expression {
      font-size: 22px;
      font-weight: bold;
    }

    /* Dropdown styled to echo the green analyte controls on the other tabs */
    #dropdown_analyte {
      border-radius: 50px;
      font-size: 16px;
      color: black;
      padding: 8px 16px;
      background-color: #00ff00;
      border: 1px solid green;
      cursor: pointer;
      max-width: 100%;
    }

    /* --- The 12-graph area: 6 stacked pairs --- */
    .grid {
      padding: 8px;
    }

    .pair {
      margin-bottom: 18px;
    }

    .pair-label {
      font-size: 20px;
      font-weight: bold;
      color: #000;
      background-color: rgba(255,255,255,0.55);
      border-left: 6px solid green;
      padding: 6px 12px;
      margin: 0 2px 6px 2px;
      border-radius: 4px;
    }

    /* Two graphs side by side, each filling half the available width */
    .imgs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .cell {
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 6px;
      box-sizing: border-box;
      min-width: 0;                 /* let the cell shrink so the image can too */
    }

    .cap {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #333;
      margin-bottom: 4px;
    }

    .cell a {
      display: block;
      line-height: 0;               /* kill the anchor's inline gap */
    }

    .cell img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Placeholder shown when a particular analyte/group combo has no graph */
    .missing {
      display: none;
      color: #a00;
      font-size: 13px;
      font-style: italic;
      padding: 24px 8px;
      text-align: center;
      background: repeating-linear-gradient(45deg,#fafafa,#fafafa 10px,#f0f0f0 10px,#f0f0f0 20px);
      border-radius: 4px;
    }

    /* On narrow phones, trim padding so the two graphs stay as large as possible */
    @media (max-width: 600px) {
      .grid { padding: 4px; }
      .imgs { gap: 4px; }
      .cell { padding: 3px; }
      .pair-label { font-size: 17px; }
      .cap { font-size: 11px; }
    }
  </style>
</head>
<body>

  <div class="selector-bar">
    <span class="lhs-highlight-expression">Select Analyte:</span>
    <select id="dropdown_analyte">
      <option value="AAPR">AAPR</option>
      <option value="Adiponectin">Adiponectin</option>
      <option value="Albumin">Albumin</option>
      <option value="Alkaline Phosphatase">Alkaline Phosphatase</option>
      <option value="ALT - Alanine aminotransferase">ALT - Alanine aminotransferase</option>
      <option value="Amylase">Amylase</option>
      <option value="Apelin">Apelin</option>
      <option value="AGP-2">AGP-2</option>
      <option value="aPTT - Activated Partial Thromboplastin Time">aPTT - Activated Partial Thromboplastin Time</option>
      <option value="AST - Aspartate Aminotransferase">AST - Aspartate Aminotransferase</option>
      <option value="Basophils (absolute)">Basophils (absolute)</option>
      <option value="Basophils (percent)">Basophils (percent)</option>
      <option value="bFGF">bFGF</option>
      <option value="Bicarbonate">Bicarbonate</option>
      <option value="Bilirubin, Direct">Bilirubin, Direct</option>
      <option value="Bilirubin, Indirect">Bilirubin, Indirect</option>
      <option value="Bilirubin, Total">Bilirubin, Total</option>
      <option value="BMI">BMI</option>
      <option value="BPDiastolic">BP Diastolic</option>
      <option value="BPSystolic">BP Systolic</option>
      <option value="BUN - Blood Urea Nitrogen">BUN - Blood Urea Nitrogen</option>
      <option value="Calcium, Total">Calcium, Total</option>
      <option value="Chloride">Chloride</option>
      <option value="Creatine Kinase">Creatine Kinase</option>
      <option value="Creatinine">Creatinine</option>
      <option value="Eosinophils (absolute)">Eosinophils (absolute)</option>
      <option value="Eosinophils (percent)">Eosinophils (percent)</option>
      <option value="FGF-21">FGF-21</option>
      <option value="GGT - Gamma Glutamyl Transferase">GGT - Gamma Glutamyl Transferase</option>
      <option value="Glucose">Glucose</option>
      <option value="GM-CSF">GM-CSF</option>
      <option value="HbA1c">HbA1c</option>
      <option value="HDL Cholesterol">HDL Cholesterol</option>
      <option value="Hematocrit">Hematocrit</option>
      <option value="Hemoglobin">Hemoglobin</option>
      <option value="HOMA_IR">HOMA-IR</option>
      <option value="IGF-1">IGF-1</option>
      <option value="IL-5">IL-5</option>
      <option value="IL-6">IL-6</option>
      <option value="IL-10">IL-10</option>
      <option value="INR - International Normalized Ratio">INR - International Normalized Ratio</option>
      <option value="Insulin">Insulin</option>
      <option value="LAR">LAR</option>
      <option value="LDH - Lactate dehydrogenase">LDH - Lactate dehydrogenase</option>
      <option value="LDL Cholesterol">LDL Cholesterol</option>
      <option value="Leptin">Leptin</option>
      <option value="Lipase">Lipase</option>
      <option value="Lymphocytes (absolute)">Lymphocytes (absolute)</option>
      <option value="Lymphocytes (percent)">Lymphocytes (percent)</option>
      <option value="Magnesium">Magnesium</option>
      <option value="Monocytes (absolute)">Monocytes (absolute)</option>
      <option value="Monocytes (percent)">Monocytes (percent)</option>
      <option value="Neutrophils (absolute count)">Neutrophils (absolute count)</option>
      <option value="Neutrophils (percent)">Neutrophils (percent)</option>
      <option value="NLR">NLR (Neutrophil/Lymphocytes Ratio)</option>
      <option value="Platelet Count">Platelet Count</option>
      <option value="Potassium">Potassium</option>
      <option value="RBC (Erythrocytes)">RBC (Erythrocytes)</option>
      <option value="sFRP-5">sFRP-5</option>
      <option value="Sodium">Sodium</option>
      <option value="Total Cholesterol">Total Cholesterol</option>
      <option value="Total Protein">Total Protein</option>
      <option value="Triglycerides">Triglycerides</option>
      <option value="Urea">Urea</option>
      <option value="Uric acid">Uric acid</option>
      <option value="VEGF">VEGF</option>
      <option value="VEGF-C">VEGF-C</option>
      <option value="VEGF-D">VEGF-D</option>
      <option value="WBC (Leukocytes)">WBC (Leukocytes)</option>
      <option value="Weight">Weight</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    // Left column = MMRM (analyte-dependent), Right column = Kaplan-Meier (fixed).
    // km  -> filename fragment for study/K_M_<km>.jpg
    // mmrm-> suffix fragment for mmrm/MMRM_<analyte>_<mmrm>.png  (leading underscore included)
    const groups = [
      { label: "All Patients",                            km: "All",      mmrm: "X"   },
      { label: "Alpelisib (all)",                          km: "Alp",      mmrm: "A"   },
      { label: "Capivasertib (all)",                       km: "Capi_All", mmrm: "C"   },
      { label: "Capivasertib + Evexomostat @ 36 mg/m2",    km: "Capi_36",  mmrm: "C36" },
      { label: "Capivasertib + Evexomostat @ 49 mg/m2",    km: "Capi_49",  mmrm: "C49" },
      { label: "Protocol >= V9",                           km: "V9",       mmrm: "9"   }
    ];

    // Same normalization TabMMRM.html applies: spaces, commas, and parens -> "_"
    function analyteToUl(analyte) {
      return analyte
        .replace(/ /g, "_")
        .replace(/,/g, "_")
        .replace(/\(/g, "_")
        .replace(/\)/g, "_");
    }

    const dropdown = document.getElementById("dropdown_analyte");
    const grid = document.getElementById("grid");

    // Build one cell: a linked, self-healing image + a hidden "not available" note.
    function makeCell(idBase, captionText) {
      const cell = document.createElement("div");
      cell.className = "cell";

      const cap = document.createElement("span");
      cap.className = "cap";
      cap.textContent = captionText;

      const link = document.createElement("a");
      link.target = "_blank";              // open full-size graph in a new tab
      link.rel = "noopener";

      const img = document.createElement("img");
      img.id = idBase + "-img";

      const missing = document.createElement("div");
      missing.className = "missing";
      missing.id = idBase + "-missing";

      img.onerror = function () {
        img.style.display = "none";
        missing.style.display = "block";
      };
      img.onload = function () {
        img.style.display = "block";
        missing.style.display = "none";
      };

      link.appendChild(img);
      cell.appendChild(cap);
      cell.appendChild(link);
      cell.appendChild(missing);
      return { cell: cell, img: img, link: link, missing: missing };
    }

    // Point a cell at a src, resetting the placeholder state.
    function setSrc(refs, src, altText, missingText) {
      refs.missing.textContent = missingText;
      refs.img.alt = altText;
      refs.img.style.display = "block";
      refs.missing.style.display = "none";
      refs.link.href = src;
      refs.img.src = src;
    }

    // Build the 6 pairs once; keep references so we only swap MMRM srcs later.
    const mmrmRefs = [];
    groups.forEach(function (g, i) {
      const pair = document.createElement("div");
      pair.className = "pair";

      const label = document.createElement("div");
      label.className = "pair-label";
      label.textContent = g.label;

      const imgs = document.createElement("div");
      imgs.className = "imgs";

      const left = makeCell("mmrm-" + i, "MMRM");
      const right = makeCell("km-" + i, "Kaplan-Meier");

      imgs.appendChild(left.cell);
      imgs.appendChild(right.cell);
      pair.appendChild(label);
      pair.appendChild(imgs);
      grid.appendChild(pair);

      mmrmRefs.push(left);

      // Kaplan-Meier images are fixed (analyte-independent) -> set them just once.
      const kmSrc = "study/K_M_" + g.km + ".jpg";
      setSrc(right, kmSrc,
             "Kaplan-Meier (" + g.label + ")",
             "No Kaplan-Meier graph: " + kmSrc);
    });

    // Update the 6 left-column MMRM graphs when the analyte changes.
    function updateMMRM() {
      const analyte = dropdown.value;
      const ul = analyteToUl(analyte);
      groups.forEach(function (g, i) {
        const src = "mmrm/MMRM_" + ul + "_" + g.mmrm + ".png";
        setSrc(mmrmRefs[i], src,
               "MMRM " + analyte + " (" + g.label + ")",
               "No MMRM graph for " + analyte + " \u2014 " + g.label);
      });
    }

    dropdown.addEventListener("change", updateMMRM);
    updateMMRM();   // populate on first load
  </script>
</body>
</html>
